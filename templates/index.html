<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Погода</title>
<style>
    body {
        font-family: Arial, "Segoe UI Emoji", sans-serif;
        text-align: center;
        background: linear-gradient(to right, #74ebd5, #9face6);
    }

    .container {
        margin-top: 50px;
    }

    input {
        padding: 10px;
        width: 200px;
        border-radius: 5px;
        border: none;
    }

    button {
        padding: 10px 15px;
        border-radius: 5px;
        border: none;
        background: green;
        color: white;
        cursor: pointer;
    }

    .card {
        background: #4CAF50; /* зелёный блок */
        color: white; /* текст белый */
        padding: 20px;
        margin: 20px auto;
        width: 300px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .error {
        color: yellow; /* ошибки видны на зелёном фоне */
    }
</style>
</head>
<body>

<div class="container">
    <h1>🌤️ Погода</h1>

    <!-- Форма для ввода города -->
    <form method="POST">
        <input type="text" name="city" placeholder="Введите город" required>
        <button type="submit">Узнать</button>
    </form>

    <!-- Блок с погодой -->
    {% if weather %}
        <div class="card">
            {% if weather.error %}
                <p class="error">{{ weather.error }}</p>
            {% else %}
                <h2>{{ weather.city }}</h2>
                <img src="http://openweathermap.org/img/wn/{{ weather.icon }}@2x.png">
                <p>🌡 Температура: {{ weather.temp }}°C</p>
                <p>🤔 Ощущается как: {{ weather.feels_like }}°C</p>
                <p>☁ {{ weather.description }}</p>
            {% endif %}
        </div>
    {% endif %}

</div>

</body>
</html>
